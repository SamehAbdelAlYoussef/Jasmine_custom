<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#059669"/>

  <!-- Label shape -->
  <rect x="20" y="18" width="78" height="60" rx="4" fill="#fff" opacity="0.95"/>
  <!-- Label fold triangle -->
  <polygon points="98,18 98,34 82,18" fill="#D1FAE5"/>

  <!-- Barcode bars on label -->
  <rect x="30" y="28" width="6" height="40" rx="1" fill="#059669"/>
  <rect x="39" y="28" width="3" height="40" rx="1" fill="#059669"/>
  <rect x="45" y="34" width="5" height="34" rx="1" fill="#059669"/>
  <rect x="53" y="28" width="8" height="40" rx="1" fill="#059669"/>
  <rect x="64" y="30" width="3" height="38" rx="1" fill="#059669"/>
  <rect x="70" y="28" width="6" height="40" rx="1" fill="#059669"/>
  <rect x="79" y="32" width="4" height="36" rx="1" fill="#059669"/>

  <!-- Text lines below barcode -->
  <rect x="30" y="72" width="40" height="3" rx="1.5" fill="#fff" opacity="0.7"/>
  <rect x="30" y="78" width="30" height="3" rx="1.5" fill="#fff" opacity="0.5"/>

  <!-- Printer icon at bottom right -->
  <rect x="76" y="82" width="36" height="28" rx="3" fill="#fff" opacity="0.9"/>
  <rect x="80" y="88" width="28" height="12" rx="2" fill="#059669"/>
  <rect x="84" y="74" width="20" height="10" rx="2" fill="#fff" opacity="0.9"/>
  <!-- Paper coming out -->
  <rect x="82" y="72" width="28" height="5" rx="1" fill="#A7F3D0"/>
  <rect x="86" y="68" width="20" height="5" rx="1" fill="#A7F3D0"/>
</svg>
