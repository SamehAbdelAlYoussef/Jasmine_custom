name: Deploy Custom Addons

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # اطبع المسار الحالي لمعرفة أين تقف
            echo "Current Path:"
            pwd
            
            # اطبع قائمة المجلدات في opt
            echo "Listing /opt:"
            ls -l /opt
            
            # محاولة الدخول وتحديث الكود
            cd /opt/odoo_docker/Jasmine_custom && git pull origin main