name: Deploy Custom Addons

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # التأكد من وجود المجلد وصلاحيته
            ls -ld /opt/odoo_docker/Jasmine_custom
            
            # سحب التحديثات
            cd /opt/odoo_docker/Jasmine_custom
            git pull origin main
            
            # إعادة تشغيل الحاوية
            cd /opt/odoo_docker
            docker-compose restart web_ent